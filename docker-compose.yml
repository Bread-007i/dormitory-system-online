services:
  db:
    image: mysql:8.0
    container_name: dormitory-db
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: dormitory_system
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./backend/database-schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dormitory-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: dormitory-phpmyadmin
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: 1234
      PMA_ABSOLUTE_URI: http://localhost:8081/
      PMA_ARBITRARY: 1
    ports:
      - "8081:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dormitory-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dormitory-backend
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: 1234
      DB_NAME: dormitory_system
      NODE_ENV: development
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    networks:
      - dormitory-network

volumes:
  db-data:

networks:
  dormitory-network:
    driver: bridge
